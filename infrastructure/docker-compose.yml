version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: stylehub-postgres
    environment:
      POSTGRES_USER: stylehub
      POSTGRES_PASSWORD: stylehub_pass
      POSTGRES_DB: stylehub
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylehub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stylehub-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
